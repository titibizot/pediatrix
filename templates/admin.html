<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Pediatrix</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e8f4ff; /* Fond original */
            font-family: 'Nunito', sans-serif;
        }
        .container {
            margin-top: 50px;
        }
        h1, h3 {
            color: #0066cc;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between">
        <a href="{{ url_for('home') }}" class="btn btn-primary">Accueil</a>
        <a href="{{ url_for('reset') }}" class="btn btn-secondary">Réinitialiser l'application</a>
    </div>
    <h1 class="mt-3">Administration - Base de Données</h1>
    {% if message %}
    <div class="alert alert-info mt-3" role="alert">
        {{ message }}
    </div>
    {% endif %}
    
    <h3 class="mt-4">Liste des maladies</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Mots-clés</th>
                <th>Lien</th>
            </tr>
        </thead>
        <tbody>
            {% for disease in diseases %}
            <tr>
                <td>{{ disease.name }}</td>
                <td>{{ disease.keywords }}</td>
                <td><a href="{{ disease.link }}" target="_blank">Voir</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <h3 class="mt-4">Ajouter une nouvelle maladie</h3>
    <form method="post" action="{{ url_for('admin') }}" novalidate>
        <div class="form-group">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="keywords">Mots-clés (séparés par des virgules) :</label>
            <input type="text" id="keywords" name="keywords" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="link">Lien :</label>
            <input type="url" id="link" name="link" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Ajouter</button>
    </form>
</div>
</body>
</html>
